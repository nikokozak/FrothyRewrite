<!doctype html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Frothy — flash a board</title>
<link rel="stylesheet" href="./style.css">
</head>
<body>

<main id="app" hidden>
  <h1>Frothy</h1>

  <section id="picker">
    <label>Board <select id="board"></select></label>

</section>
