name: Release

# Cut a release from a version tag: build each web-flasher firmware and the VS
# Code extension, then attach them to a GitHub release. See the "Releasing"
# section of CONTRIBUTING.md.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the release and upload assets

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache ESP-IDF
        uses: actions/cache@v4
        with:
          path: |
            ~/.froth/sdk
            ~/.espressif
          key: ${{ runner.os }}-esp-idf-v5.5-esp32-esp32c6-esp32s3

      - name: Install ESP-IDF
        run: tools/setup-esp-idf.sh

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Build web flasher bundle
        run: tools/build-flasher-bundle.sh dist-release

      - name: Build VS Code extension
        run: make vsix

      - name: Collect artifacts
        run: |
          cp editors/vscode/frothy-*.vsix dist-release/
          segment_count="$(find dist-release -maxdepth 1 -type f -name '*-*-0x*.bin' | wc -l | tr -d ' ')"
          vsix_count="$(find dist-release -maxdepth 1 -type f -name 'frothy-*.vsix' | wc -l | tr -d ' ')"
          test "$segment_count" = 9
          test "$vsix_count" = 1
          test -f dist-release/manifest.json
          firmware_files=(dist-release/*-*-0x*.bin)
          tar -czf "dist-release/frothy-firmware-${GITHUB_REF_NAME}.tar.gz" \
            -C dist-release manifest.json "${firmware_files[@]#dist-release/}"
          ls -l dist-release

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "Frothy $GITHUB_REF_NAME" \
            --generate-notes \
            dist-release/*
