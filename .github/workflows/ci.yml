name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  host:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: npm
          cache-dependency-path: editors/vscode/package-lock.json

      - run: make test
      - run: make test-unity
      - run: make test-host-normal-transcript
      - run: make test-esp32-plain-host-transcript
      - run: make test-lib-e2e
      - run: make examples
      - run: make check-examples-manifest

      - name: Go tests
        run: |
          go list ./cmd/... ./internal/...
          go test ./cmd/... ./internal/...

      - name: VS Code extension npm tests
        working-directory: editors/vscode
        run: |
          npm ci
          npm test
          npm run build

  esp32-build:
    name: ESP-IDF (${{ matrix.board }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board:
          - esp32_devkit_v1
          - seeed_xiao_esp32s3
    steps:
      - uses: actions/checkout@v4

      - name: Cache ESP-IDF
        uses: actions/cache@v4
        with:
          path: |
            ~/.froth/sdk
            ~/.espressif
          key: ${{ runner.os }}-esp-idf-v5.5

      - name: Install ESP-IDF
        run: tools/setup-esp-idf.sh

      - name: Build firmware
        run: |
          . "$HOME/.froth/sdk/esp-idf/export.sh"
          make artifacts BOARD="${{ matrix.board }}"
